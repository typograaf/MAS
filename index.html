<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAS — Glass Overlay</title>
  </head>
  <body>
    <div id="app">
      <aside id="controls">
        <header>
          <h1>MAS</h1>
          <p>Glass overlay generator</p>
        </header>

        <section class="drop-zone" id="dropZone">
          <p>Drop image or video<br /><span>or click to choose</span></p>
          <input type="file" id="fileInput" accept="image/*,video/*" hidden />
        </section>

        <div class="slider">
          <div class="row">
            <label>Format</label>
          </div>
          <select id="formatSelect">
            <option value="1920x1080" selected>1920 × 1080 (HD)</option>
            <option value="3840x2160">3840 × 2160 (4K)</option>
            <option value="1080x1080">1080 × 1080 (Square)</option>
            <option value="1080x1920">1080 × 1920 (Story)</option>
            <option value="1080x1350">1080 × 1350 (Portrait)</option>
            <option value="2560x1080">2560 × 1080 (Cinema)</option>
            <option value="">Original size</option>
          </select>
        </div>

        <section class="sliders" id="sliders"></section>

        <section class="gradient">
          <div class="row">
            <label>
              <input type="checkbox" id="gradientToggle" />
              Gradient map
            </label>
          </div>
          <div class="gradient-bar" id="gradientBar"></div>
          <div class="gradient-stops" id="gradientStops"></div>
          <button id="addStopBtn" type="button">+ Add stop</button>
        </section>

        <section class="presets">
          <button id="copySettingsBtn">Copy settings</button>
          <button id="pasteSettingsBtn">Paste settings</button>
        </section>

        <section class="playback">
          <button id="playBtn" disabled>Play</button>
          <div class="slider">
            <div class="row">
              <label>Speed</label>
              <span class="val" id="speedVal">60 px/s</span>
            </div>
            <input type="range" id="speedSlider" min="-300" max="300" step="1" value="60" />
          </div>
        </section>

        <div class="slider">
          <div class="row">
            <label>Export format</label>
          </div>
          <select id="exportFormatSelect"></select>
        </div>
        <div class="slider">
          <div class="row">
            <label>Export resolution</label>
          </div>
          <select id="exportResSelect">
            <option value="1280">720p (faster)</option>
            <option value="1920" selected>1080p</option>
            <option value="2560">1440p</option>
            <option value="3840">4K (slower)</option>
          </select>
        </div>
        <button id="exportBtn" disabled>Export</button>
      </aside>

      <main id="stage">
        <canvas id="canvas"></canvas>
        <div id="placeholder">Drop a photo to begin</div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
